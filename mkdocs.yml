site_name: magic
site_description: Common building blocks for Go microservices, so your service code can focus on business logic.
site_url: https://tink3rlabs.github.io/magic/
repo_url: https://github.com/tink3rlabs/magic
repo_name: tink3rlabs/magic
edit_uri: edit/main/docs/

exclude_docs: |
  superpowers/

theme:
  name: material
  icon:
    logo: material/auto-fix
  favicon: assets/favicon.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: black
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: white
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Quick start: getting-started.md
  - Tutorial: tutorial.md
  - Lucene: lucene.md
  - Storage: storage.md
  - Observability: observability.md
  - Contributing: contributing.md

not_in_nav: |
  observability-internals.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      url_download: true
      url_timeout: 10
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra:
  version:
    provider: mike
    default: latest
